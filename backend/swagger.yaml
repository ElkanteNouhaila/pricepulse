openapi: 3.0.0
info:
  title: PricePulse API
  version: 1.0.0
  description: API de suivi de prix de produits e-commerce

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /products:
    get:
      summary: Liste tous les produits suivis
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Numéro de page
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Nombre de résultats par page
      responses:
        '200':
          description: Liste des produits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: Ajouter un produit à suivre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - name
                - initial_price
              properties:
                url:
                  type: string
                  format: uri
                  example: https://amazon.com/dp/B08N5WRWNW
                name:
                  type: string
                  example: iPhone 15
                initial_price:
                  type: number
                  format: float
                  example: 999.99
      responses:
        '201':
          description: Produit créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_url:
                  value: { error: "Invalid URL", code: "INVALID_URL" }
                invalid_price:
                  value: { error: "Invalid price", code: "INVALID_PRICE" }
                duplicate_url:
                  value: { error: "URL already tracked", code: "DUPLICATE_URL" }
        '500':
          $ref: '#/components/responses/InternalError'

  /products/{id}:
    delete:
      summary: Supprimer un produit du suivi
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Produit supprimé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          description: Produit introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /products/{id}/history:
    get:
      summary: Historique des prix d'un produit
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Historique des prix
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PricePoint'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: iPhone 15
        url:
          type: string
          example: https://amazon.com/dp/B08N5WRWNW
        initial_price:
          type: number
          example: 999.99
        current_price:
          type: number
          example: 949.99
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PricePoint:
      type: object
      properties:
        price:
          type: number
          example: 949.99
        recorded_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

  responses:
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Erreur serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'