services:
  postgres:
    image: postgres:15-alpine
    container_name: pricepulse_db
    environment:
      POSTGRES_DB: pricepulse
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d pricepulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pricepulse_backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dev:devpass@postgres:5432/pricepulse
      NODE_ENV: production
      PORT: 3000

  frontend:
    build:
      context: ./frontend
      args:
        # VITE env vars are baked in at build time — must pass as build args
        VITE_API_URL: http://localhost:3000
    container_name: pricepulse_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: